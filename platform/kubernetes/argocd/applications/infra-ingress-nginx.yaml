apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: infra-ingress-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.1

    helm:
      values: |
        controller:
          replicaCount: 2

          ingressClassResource:
            name: nginx
            enabled: true
            default: false

          ingressClass: nginx

          service:
            type: NodePort

          metrics:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
