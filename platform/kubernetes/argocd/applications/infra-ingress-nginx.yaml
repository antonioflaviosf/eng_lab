apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: infra-ingress-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.12.1

    helm:
      values: |
        controller:
          replicaCount: 1

          ingressClassResource:
            name: nginx
            enabled: true
            default: true       # DEFINIDO O NGINX COMO INGRESS PADRÃO

          ingressClass: nginx

          service:
            type: LoadBalancer  # CORRIGIDO: Permite que o K3s exponha o NGINX nas portas 80 e 443

          metrics:
            enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
