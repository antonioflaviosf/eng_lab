apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx
  namespace: argocd

spec:
  project: default
  source:
    repoURL: 'https://github.com/antonioflaviosf/eng_lab.git'
    targetRevision: main
    path: platform/kubernetes/apps/nginx
  
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nginxapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true